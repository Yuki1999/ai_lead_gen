services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    environment:
      MEDBOT_DB_PATH: /data/medbot.db
      AGENT_BASE_URL: http://agent:8011
      AGENT_ENV_PATH: /app/agent/.env
      PYTHONUNBUFFERED: "1"
    volumes:
      - medbot-data:/data
      - ./agent/.env:/app/agent/.env
    depends_on:
      agent:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  agent:
    build:
      context: .
      dockerfile: agent/Dockerfile
    env_file:
      - ./agent/.env
    environment:
      PROJECT_ROOT: /app
      BACKEND_BASE_URL: http://backend:8000
      AGENT_HOST: 0.0.0.0
      AGENT_PORT: "8011"
      AGENT_CORS_ORIGIN: "${PUBLIC_ORIGIN:-http://localhost:5173}"
    volumes:
      - ./agent/.env:/app/agent/.env
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8011/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        VITE_API_BASE_URL: /api
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-5173}:80"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1/health"]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

volumes:
  medbot-data:
